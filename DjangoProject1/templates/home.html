<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Classifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #6f42c1; }
    </style>
</head>
<body>
    <div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow rounded-4 border-0">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4">🐱 AI Cat vs Dog Classifier 🐶</h2>

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Upload an image:</label>
                            <input type="file" name="image" class="form-control" accept="image/*" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Predict</button>
                        </div>
                    </form>

                    {% if predicted_class %}
                        <div class="alert alert-success mt-4 text-center">
                            <h4 class="alert-heading">Result!</h4>
                            <p>Prediction: <strong>{{ predicted_class }}</strong></p>
                            <p class="mb-0">Confidence: <strong>{{ confidence }}</strong></p>
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
